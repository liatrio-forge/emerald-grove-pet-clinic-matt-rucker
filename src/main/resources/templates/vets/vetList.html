<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'vets')}">

<body>

  <section class="liatrio-section">
    <div class="liatrio-table-card">
      <div class="liatrio-card-header">
        <h2 th:text="#{vets}">Veterinarians</h2>
        <p class="liatrio-muted" th:text="#{vets.subtitle}">A snapshot of the care team and specialties.</p>
      </div>

      <div class="liatrio-filter-bar" id="specialty-filters">
        <a th:href="@{/vets.html}" class="liatrio-filter-pill"
          th:classappend="${#strings.isEmpty(currentFilter)} ? ' liatrio-filter-pill--active'"
          th:text="#{filterAll}">All</a>
        <a th:each="specialty : ${specialties}"
          th:href="@{/vets.html(filter=${specialty.name})}" class="liatrio-filter-pill"
          th:classappend="${#strings.equalsIgnoreCase(currentFilter, specialty.name)} ? ' liatrio-filter-pill--active'"
          th:text="${specialty.name}">Specialty</a>
        <a th:href="@{/vets.html(filter='none')}" class="liatrio-filter-pill"
          th:classappend="${#strings.equalsIgnoreCase(currentFilter, 'none')} ? ' liatrio-filter-pill--active'"
          th:text="#{filterNone}">None</a>
      </div>

      <table id="vets" class="table table-striped liatrio-table">
        <thead>
          <tr>
            <th th:text="#{name}">Name</th>
            <th th:text="#{specialties}">Specialties</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="vet : ${listVets}">
            <td th:text="${vet.firstName + ' ' + vet.lastName}"></td>
            <td>
              <span th:each="specialty : ${vet.specialties}" th:text="${specialty.name + ' '}" /> <span
                th:if="${vet.nrOfSpecialties == 0}" th:text="#{none}">none</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <div th:if="${totalPages > 1}" class="liatrio-pagination"
    th:with="filterParam=${#strings.isEmpty(currentFilter)} ? '' : '&amp;filter=' + ${currentFilter}">
    <span th:text="#{pages}">Pages:</span>
    <span>[</span>
    <span th:each="i: ${#numbers.sequence(1, totalPages)}">
      <a th:if="${currentPage != i}" th:href="@{'/vets.html?page=' + ${i} + ${filterParam}}">[[${i}]]</a>
      <span th:unless="${currentPage != i}">[[${i}]]</span>
    </span>
    <span>]&nbsp;</span>
    <span>
      <a th:if="${currentPage > 1}" th:href="@{'/vets.html?page=1' + ${filterParam}}" th:title="#{first}"
        class="fa fa-fast-backward"></a>
      <span th:unless="${currentPage > 1}" th:title="#{first}" class="fa fa-fast-backward"></span>
    </span>
    <span>
      <a th:if="${currentPage > 1}" th:href="@{'/vets.html?page=__${currentPage - 1}__' + ${filterParam}}" th:title="#{previous}"
        class="fa fa-step-backward"></a>
      <span th:unless="${currentPage > 1}" th:title="#{previous}" class="fa fa-step-backward"></span>
    </span>
    <span>
      <a th:if="${currentPage < totalPages}" th:href="@{'/vets.html?page=__${currentPage + 1}__' + ${filterParam}}" th:title="#{next}"
        class="fa fa-step-forward"></a>
      <span th:unless="${currentPage < totalPages}" th:title="#{next}" class="fa fa-step-forward"></span>
    </span>
    <span>
      <a th:if="${currentPage < totalPages}" th:href="@{'/vets.html?page=__${totalPages}__' + ${filterParam}}" th:title="#{last}"
        class="fa fa-fast-forward"></a>
      <span th:unless="${currentPage < totalPages}" th:title="#{last}" class="fa fa-fast-forward"></span>
    </span>
  </div>
</body>

</html>

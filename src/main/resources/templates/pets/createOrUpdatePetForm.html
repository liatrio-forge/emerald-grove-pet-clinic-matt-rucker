<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'owners')}">

<body>

  <h2>
    <th:block th:if="${pet['new']}" th:text="#{new}">New </th:block>
    <span th:text="#{pet}">Pet</span>
  </h2>
  <form th:object="${pet}" class="form-horizontal" method="post">
    <input type="hidden" name="id" th:value="*{id}" />
    <div class="form-group has-feedback">
      <div class="form-group">
        <label class="col-sm-2 control-label" th:text="#{owner}">Owner</label>
        <div class="col-sm-10">
          <span th:text="${owner?.firstName + ' ' + owner?.lastName}" />
        </div>
      </div>
      <input th:replace="~{fragments/inputField :: input ('Name', 'name', 'text')}" />
      <input th:replace="~{fragments/inputField :: input ('Birth Date', 'birthDate', 'date')}" />
      <input th:replace="~{fragments/selectField :: select ('Type', 'type', ${types})}" />
    </div>
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button th:with="text=${pet['new']} ? 'Add Pet' : 'Update Pet'" class="btn btn-primary" type="submit"
          th:text="${text}">Add Pet</button>
      </div>
    </div>
  </form>

  <div th:unless="${pet['new']}" class="mt-3">
    <form th:action="@{/owners/__${owner.id}__/pets/__${pet.id}__/delete}" method="post"
      th:with="visitCount=${pet.visits.size()},confirmMsg=${visitCount > 0 ? 'This pet has ' + visitCount + ' visit(s) that will also be deleted. Are you sure you want to delete ' + pet.name + '?' : 'Are you sure you want to delete ' + pet.name + '?'}"
      onsubmit="return confirm(this.dataset.msg);" th:attr="data-msg=${confirmMsg}">
      <button type="submit" class="btn btn-danger" th:text="#{deletePet}">Delete Pet</button>
    </form>
  </div>

</body>

</html>
